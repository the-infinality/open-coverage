[profile.default]
src = "src"
out = "out"
libs = ["node_modules", "lib"]
fs_permissions = [{ access = "read", path = "./config"}]

# Optimizer settings for contract size reduction
optimizer = false
optimizer_runs = 1000000
via_ir = false

# Default chain ID for testing (Ethereum mainnet fork)
# Can be overridden for other operations with --chain-id <id>
chain_id = 1

remappings = [
  "@openzeppelin-v5/contracts/=lib/openzepplin-contracts-v5/contracts/",
  "@openzeppelin-v5/contracts-upgradeable/=lib/openzepplin-contracts-upgradeable-v5/contracts/",
  "eigenlayer-contracts/=lib/eigenlayer-contracts/src/contracts/",
  "@uniswap/universal-router/=lib/uniswap-universal-router/contracts/",
  "@uniswap/v3-periphery/=lib/uniswap-universal-router/lib/v3-periphery/",
  "@uniswap/v4-periphery/=lib/uniswap-universal-router/lib/v4-periphery/",
  "@uniswap/v4-core/=lib/uniswap-universal-router/lib/v4-periphery/lib/v4-core/",
  "@uniswap/permit2/=lib/uniswap-universal-router/lib/permit2/",
  "forge-std/=lib/forge-std/src/"
]

[rpc_endpoints]
mainnet = "${MAINNET_ARCHIVE_RPC}"

[lint]
ignore = [
    "src/**/external-*/*.sol"
]

exclude_lints = [
    "mixed-case-function",
    "mixed-case-variable"
]


# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
